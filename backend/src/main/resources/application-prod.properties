spring.application.name=backend-ecommerce-grupo-innovar

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

app.frontend.url=${FRONTEND_URL}
app.base-url=${BASE_URL}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Wompi
wompi.public-key=${WOMPI_PUBLIC}
wompi.private-key=${WOMPI_PRIVATE}
wompi.url=https://sandbox.wompi.co
wompi.integrity-secret=${WOMPI_INTEGRITY}