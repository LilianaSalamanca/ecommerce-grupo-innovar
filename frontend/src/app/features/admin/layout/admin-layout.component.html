<div class="admin-wrapper">

  <!-- SIDEBAR -->
  <aside class="admin-sidebar">

    <div class="brand">
      <img src="assets/logo.png" alt="Grupo Innovar" class="logo-img">
      <span>Panel Admin</span>
    </div>

    <div class="user-box" *ngIf="usuario$ | async as user">

      <div class="avatar">
        {{ user.nombre.charAt(0) }}
      </div>

      <div class="user-info">
        <span class="nombre">
          {{ user.nombre }} {{ user.apellido }}
        </span>

        <span class="email">
          {{ user.email }}
        </span>
      </div>

    </div>

    <nav class="nav-links">
      <a routerLink="dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="pedidos" routerLinkActive="active">Pedidos</a>
      <a routerLink="productos" routerLinkActive="active">Productos</a>
      <a routerLink="usuarios" routerLinkActive="active">Usuarios</a>
      <a routerLink="/admin/categorias" routerLinkActive="active">Categorias</a>
      <a routerLink="/admin/promociones" routerLinkActive="active">Promociones</a>
    </nav>

    <!-- BOTONES INFERIORES -->
    <div class="admin-sidebar-footer">
      <a routerLink="configuracion" routerLinkActive="active" class="footer-link">⚙ Configuración</a>
      <button (click)="cerrarSesion()" class="logout-btn">Cerrar Sesión</button>
    </div>

  </aside>

  <!-- MAIN AREA -->
  <div class="admin-main">
    <div class="admin-content">
      <router-outlet></router-outlet>
    </div>
  </div>

</div>
