<div class="auth-card">

  <h2>Restablecer contraseña</h2>

  <input
    type="password"
    [(ngModel)]="password"
    placeholder="Nueva contraseña"
  />

  <input
    type="password"
    [(ngModel)]="confirmPassword"
    placeholder="Confirmar contraseña"
  />

  <button (click)="submit()">
    Actualizar contraseña
  </button>

  <p *ngIf="message">
    {{ message }}
  </p>

  <p *ngIf="error">
    {{ error }}
  </p>

</div>
