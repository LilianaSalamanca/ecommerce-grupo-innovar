<div class="auth-card">
  <h2>Recuperar contraseña</h2>

  <input
    type="email"
    [(ngModel)]="email"
    name="email"
    placeholder="Tu correo"
  />

  <button (click)="submit()" [disabled]="loading">
    {{ loading ? 'Enviando...' : 'Enviar enlace' }}
  </button>

  <p *ngIf="message" class="success">{{ message }}</p>
  <p *ngIf="error" class="error">{{ error }}</p>
</div>
