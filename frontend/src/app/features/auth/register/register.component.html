<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="title">Crear cuenta</h2>
    <p class="subtitle">Regístrate para continuar</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form" novalidate>

      <div class="form-group">
        <label>Nombre</label>
        <input type="text" formControlName="nombre" placeholder="Tu nombre" required />
      </div>

      <div class="form-group">
        <label>Apellido</label>
        <input type="text" formControlName="apellido" placeholder="Tu apellido" required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="ejemplo@correo.com" required />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="•••••••••" required />
      </div>

      <button class="btn-primary" type="submit" [disabled]="loading">
        <span *ngIf="!loading">Crear cuenta</span>
        <span *ngIf="loading">Creando cuenta...</span>
      </button>
    </form>

    <div *ngIf="errorMsg" class="error-message">{{ errorMsg }}</div>
    <div *ngIf="successMsg" class="success-message">{{ successMsg }}</div>

    <p class="register-link">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Iniciar sesión</a>
    </p>
  </div>
</div>
