<nav class="navbar">
  <div class="nav-container">

    <!-- CONTENIDO PRINCIPAL -->
    <div class="menu" [ngClass]="{ 'open': menuAbierto }">

      <!-- LOGO -->
      <a class="logo" routerLink="/">
        <img src="assets/logo.png" alt="Grupo Innovar" />
      </a>

      <!-- BUSCADOR -->
      <div class="buscador">
        <input class="input-busqueda"
          type="text"
          [(ngModel)]="terminoBusqueda"
          (keyup)="onSearchInput()"
          placeholder="Buscar productos..."
        />
        <i class="fas fa-search"></i>
      </div>

      <!-- ACCIONES -->
      <div class="acciones">

        <!-- INICIO -->
        <a class="nav-link" routerLink="/">
          Inicio
        </a>

        <!-- PEDIDOS -->
        <a class="nav-link" [routerLink]="['/orders']">
          Pedidos
        </a>

        <!-- CARRITO -->
        <a class="carrito" routerLink="/cart">
          <i class="fas fa-shopping-cart"></i>
          <span *ngIf="cantidadCarrito > 0" class="contador">
            {{ cantidadCarrito }}
          </span>
        </a>

        <!-- LOGUEADO -->
        <ng-container *ngIf="isLogged; else noLogueado">

          <div
            class="usuario-menu"
            [ngClass]="{ 'show': userMenuOpen }">

            <button
              class="usuario-btn"
              (click)="$event.stopPropagation(); toggleUserMenu()">

              <span class="icono-usuario">
                <i class="fas fa-user"></i>
              </span>

              {{ nombreUsuario }}

              <i class="fas fa-chevron-down"></i>

            </button>

            <div class="usuario-dropdown">

              <a routerLink="/dashboard">
                Mi perfil
              </a>

              <a (click)="logout()">
                Cerrar sesión
              </a>

            </div>

          </div>

        </ng-container>

        <!-- NO LOGUEADO -->
        <ng-template #noLogueado>
          <button class="btn-login" routerLink="/login">Ingresar</button>
        </ng-template>

      </div>
    </div>
  </div>
</nav>
